name: Deploy to OpenShift
on:
  push:
    branches: [ main ] # Vérifie bien si ta branche s'appelle main ou master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate with OpenShift
      uses: redhat-actions/oc-login@v1
      with:
        openshift_server: ${{ secrets.OPENSHIFT_SERVER }}
        openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
        insecure_skip_tls_verify: true

    - name: Apply Configuration
      run: |
        # On applique dans l'ordre pour ne pas saturer le quota
        oc apply -f 02-services/mysql.yaml
        oc apply -f web-service.yaml
        oc apply -f 03-reseau/
        oc apply -f 01-virtualisation/vm2.yaml
        oc apply -f 01-virtualisation/fedora.yaml
