apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2
  namespace: soxnaamycoulibaly-dev
spec:
  runStrategy: Always
  template:
    spec:
      domain:
        devices:
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitvolume # Doit être identique au nom dans volumes
          interfaces:
            - masquerade: {}
              name: default
        resources:
          requests:
            memory: 800Mi
      networks:
        - name: default
          pod: {}
      volumes:
        - containerDisk:
            image: 'quay.io/containerdisks/ubuntu:22.04'
          name: rootdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              user: ubuntu
              password: AmyPass2026
              chpasswd: { expire: False }
              ssh_pwauth: True
          name: cloudinitvolume # Doit être identique au nom dans disks
